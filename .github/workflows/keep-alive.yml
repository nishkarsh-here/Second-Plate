name: Keep API warm

# Render's free tier spins the API down after ~15 min idle (cold start ~30-60s).
# This pings /health on a schedule so the live demo stays responsive.
#
# NOTE: keeping a free instance always awake consumes free-tier hours — disable
# this workflow (Actions tab -> "Keep API warm" -> Disable workflow) when you
# don't need it. GitHub's scheduled runs can also be delayed a few minutes; for
# guaranteed uptime use an external pinger (e.g. UptimeRobot, 5-min interval).

on:
  schedule:
    - cron: "*/10 * * * *" # every ~10 minutes
  workflow_dispatch: {} # allow manual runs from the Actions tab

# Don't pile up runs if a previous one is still going.
concurrency:
  group: keep-alive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health (retry to cover cold start)
        run: |
          URL="https://secondplate-api.onrender.com/health"
          for attempt in 1 2 3 4; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$URL") || code=000
            echo "Attempt $attempt -> HTTP $code"
            if [ "$code" = "200" ]; then
              echo "API is awake."
              exit 0
            fi
            sleep 25
          done
          echo "::warning::API did not return 200 after retries (it may be waking)."

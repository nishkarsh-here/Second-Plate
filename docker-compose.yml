# SecondPlate — full local stack: PostgreSQL + API (seeded & trained) + frontend.
# `docker compose up --build` then open http://localhost:8080
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: secondplate
      POSTGRES_PASSWORD: secondplate
      POSTGRES_DB: secondplate
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secondplate -d secondplate"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://secondplate:secondplate@db:5432/secondplate
      CORS_ORIGINS: http://localhost:8080,http://localhost:5173
      ENVIRONMENT: production
      MODEL_DIR: app/ml/artifacts
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  frontend:
    build: ./frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  pgdata:
